services:
  extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-extractor
    env_file:
      - .env
    environment:
      - HF_MODEL_NAME=${HF_MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
      - HF_DEVICE=${HF_DEVICE:-auto}
      - HF_MAX_NEW_TOKENS=${HF_MAX_NEW_TOKENS:-2048}
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./storage:/app/storage
      - ./auth:/app/auth
      - ./screenshots:/app/screenshots
      - hf_cache:/root/.cache/huggingface

    # Uncomment below to enable GPU access (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  hf_cache:
